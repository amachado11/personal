<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard v8 - Progress Rings</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b1121;
            --card: rgba(30, 41, 59, 0.6);
            --primary: #38bdf8;
            --success: #4ade80;
            --text: #f8fafc;
            --accent: #818cf8;
            --danger: #ef4444;
            --warning: #fbbf24;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 450px; }

        h1 { margin: 10px 0 5px 0; font-size: 1.6rem; text-align: center; }
        h2 { font-size: 0.9rem; margin: 0 0 15px 0; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Seção de Anéis de Progresso (NOVO CENTRAL) */
        .rings-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .ring-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }

        .ring-canvas { width: 100px; height: 100px; }

        .ring-info {
            position: absolute; text-align: center;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70px; /* Garante alinhamento */
        }

        .ring-icon { font-size: 1.6rem; display: block; margin-bottom: 2px; }
        .ring-label { font-size: 0.6rem; opacity: 0.7; text-transform: uppercase; }
        .ring-pct { font-size: 1rem; font-weight: 800; color: var(--text); }

        /* Controles Agrupados (NOVO DESIGN) */
        .controls-card { padding: 10px; }

        .counter-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; margin-bottom: 10px;
            background: rgba(0,0,0,0.15);
            border-radius: 16px;
        }

        .counter-label { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 1rem; }
        
        .control-group {
            display: flex; align-items: center; gap: 5px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 3px 6px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-action {
            width: 34px; height: 34px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: #0b1121;
            font-weight: 800; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        .btn-action.minus { background: #334155; color: var(--text); }

        .counter-val { font-size: 1.1rem; font-weight: 800; min-width: 55px; text-align: center; color: var(--text); }

        /* Botão Salvar Principal */
        .btn-main {
            width: 100%; padding: 18px;
            background: var(--primary);
            color: #0b1121;
            border: none;
            border-radius: 18px;
            font-weight: 900; font-size: 1.1rem;
            margin-top: 15px; cursor: pointer;
            box-shadow: 0 6px 16px 0 rgba(56, 189, 248, 0.4);
            transition: 0.2s;
        }

        .btn-main:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align:center;">
        <h1>Life <span style="color:var(--primary)">Dashboard</span></h1>
        <p id="current-date" style="opacity: 0.6; font-size: 0.8rem;"></p>
    </header>

    <div class="card" style="text-align:center">
        <h2>Metas Batidas (Mês Atual)</h2>
        <div style="display:flex; justify-content:space-around">
            <div style="text-align:center"><span style="display:block; font-size:1.8rem; font-weight:bold; color:var(--success)" id="meta-volume-txt">0%</span><span>Eficiência</span></div>
            <div style="text-align:center"><span style="display:block; font-size:1.8rem; font-weight:bold; color:var(--primary)" id="water-volume-txt">0L</span><span>Água Total</span></div>
        </div>
    </div>

    <div class="rings-container">
        <div class="ring-item">
            <canvas id="ring-sleep" class="ring-canvas"></canvas>
            <div class="ring-info">
                <span class="ring-icon">😴</span>
                <span class="ring-pct" id="pct-sleep">0%</span>
                <span class="ring-label">Sono</span>
            </div>
        </div>
        <div class="ring-item">
            <canvas id="ring-work" class="ring-canvas"></canvas>
            <div class="ring-info">
                <span class="ring-icon">💼</span>
                <span class="ring-pct" id="pct-work">0%</span>
                <span class="ring-label">Trabalho</span>
            </div>
        </div>
        <div class="ring-item">
            <canvas id="ring-leisure" class="ring-canvas"></canvas>
            <div class="ring-info">
                <span class="ring-icon">🥳</span>
                <span class="ring-pct" id="pct-leisure">0%</span>
                <span class="ring-label">Lazer</span>
            </div>
        </div>
        <div class="ring-item">
            <canvas id="ring-water" class="ring-canvas"></canvas>
            <div class="ring-info">
                <span class="ring-icon">💧</span>
                <span class="ring-pct" id="pct-water">0%</span>
                <span class="ring-label">Água</span>
            </div>
        </div>
    </div>

    <div class="card controls-card">
        <h2>Registro de Hoje</h2>
        
        <div class="counter-row">
            <span class="counter-label">😴 Sono</span>
            <div class="control-group">
                <button class="btn-action minus" onclick="changeVal('sleep', -0.5)">-</button>
                <span class="counter-val" id="val-sleep">0h</span>
                <button class="btn-action" onclick="changeVal('sleep', 0.5)">+</button>
            </div>
        </div>

        <div class="counter-row">
            <span class="counter-label">💼 Trabalho</span>
            <div class="control-group">
                <button class="btn-action minus" onclick="changeVal('work', -0.5)">-</button>
                <span class="counter-val" id="val-work">0h</span>
                <button class="btn-action" onclick="changeVal('work', 0.5)">+</button>
            </div>
        </div>

        <div class="counter-row">
            <span class="counter-label">🥳 Lazer</span>
            <div class="control-group">
                <button class="btn-action minus" onclick="changeVal('leisure', -0.5)">-</button>
                <span class="counter-val" id="val-leisure">0h</span>
                <button class="btn-action" onclick="changeVal('leisure', 0.5)">+</button>
            </div>
        </div>

        <div class="counter-row">
            <span class="counter-label">📖 Leitura</span>
            <div class="control-group">
                <button class="btn-action minus" onclick="changeVal('read', -0.25)">-</button>
                <span class="counter-val" id="val-read">0h</span>
                <button class="btn-action" onclick="changeVal('read', 0.25)">+</button>
            </div>
        </div>

        <div class="counter-row" style="margin-bottom:0">
            <span class="counter-label">💧 Água</span>
            <div class="control-group">
                <button class="btn-action minus" onclick="changeVal('water', -0.25)">-</button>
                <span class="counter-val" id="val-water">0L</span>
                <button class="btn-action" onclick="changeVal('water', 0.25)">+</button>
            </div>
        </div>

        <button class="btn-main" onclick="saveToday()">SALVAR NO GITHUB PAGES</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('life_db_v8')) || {};
    // Metas Diárias (usuário pode editar no JS por enquanto)
    let goals = { sleep: 8, work: 8, read: 0.5, water: 2.5, leisure: 2 };
    const today = new Date().toISOString().split('T')[0];
    let dayData = db[today] || { sleep: 0, work: 0, read: 0, water: 0, leisure: 0 };
    
    // Armazenamento dos gráficos de anel
    const rings = {};

    function init() {
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('pt-BR', {weekday: 'long', day: 'numeric', month: 'long'});
        initRings();
        updateUI();
    }

    // Gerenciar Contadores
    function changeVal(type, amount) {
        dayData[type] = Math.max(0, dayData[type] + amount);
        updateUI();
    }

    function updateUI() {
        // Atualizar textos dos contadores do dia
        document.getElementById('val-sleep').innerText = dayData.sleep + 'h';
        document.getElementById('val-work').innerText = dayData.work + 'h';
        document.getElementById('val-read').innerText = dayData.read + 'h';
        document.getElementById('val-water').innerText = dayData.water.toFixed(2) + 'L';
        document.getElementById('val-leisure').innerText = dayData.leisure + 'h';

        // Atualizar Anéis e Porcentagens de Meta
        updateRing('sleep', goals.sleep, '#818cf8');
        updateRing('work', goals.work, '#38bdf8');
        updateRing('leisure', goals.leisure, '#4ade80');
        updateRing('water', goals.water, '#fbbf24');

        // Resumo Mensal Simples (NOVO)
        const entries = Object.values(db);
        if (entries.length > 0) {
            const currentWater = entries.reduce((a,b)=>a+(b.water||0), 0);
            document.getElementById('water-volume-txt').innerText = currentWater.toFixed(1) + 'L';
            // Eficiência de Metas Batidas (Média simples)
            let goalsMet = 0;
            entries.forEach(d => {
                if((d.sleep||0)>=goals.sleep) goalsMet++;
                if((d.work||0)>=goals.work) goalsMet++;
                if((d.water||0)>=goals.water) goalsMet++;
            });
            const ef = ((goalsMet / (entries.length * 3)) * 100).toFixed(0);
            document.getElementById('meta-volume-txt').innerText = ef + '%';
        }
    }

    function saveToday() {
        db[today] = dayData;
        localStorage.setItem('life_db_v8', JSON.stringify(db));
        alert("Dia registrado no Moto G34!");
        location.reload();
    }

    // Configuração e Atualização dos Anéis de Progresso
    function initRings() {
        rings.sleep = createRing('ring-sleep', '#818cf8');
        rings.work = createRing('ring-work', '#38bdf8');
        rings.leisure = createRing('ring-leisure', '#4ade80');
        rings.water = createRing('ring-water', '#fbbf24');
    }

    function createRing(canvasId, color) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        return new Chart(ctx, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [0, 100], // Inicial: [Feito, Restante]
                    backgroundColor: [color, '#1a1f32'], // Cor do Progresso, Cor do Fundo
                    borderWidth: 0,
                    circumference: 360,
                    rotation: 270, // Começa no topo
                }]
            },
            options: {
                responsive: true,
                cutout: '80%', // Deixa o anel mais fino
                plugins: { legend: { display: false }, tooltip: { enabled: false } },
                scales: { x: { display: false }, y: { display: false } }
            }
        });
    }

    function updateRing(key, goal, color) {
        const val = dayData[key] || 0;
        const percent = Math.min(100, (val / goal) * 100);
        const remaining = Math.max(0, 100 - percent);

        rings[key].data.datasets[0].data = [percent, remaining];
        // Se a meta foi batida, muda a cor do fundo para sucesso
        rings[key].data.datasets[0].backgroundColor[1] = percent >= 100 ? '#4ade8055' : '#1a1f32';
        rings[key].update('none'); // Atualiza sem animação para melhor performance

        // Atualiza texto da porcentagem no centro
        document.getElementById(`pct-${key}`).innerText = percent.toFixed(0) + "%";
        if(percent >= 100) {
            document.getElementById(`pct-${key}`).style.color = 'var(--success)';
        } else {
            document.getElementById(`pct-${key}`).style.color = 'var(--text)';
        }
    }

    init();
</script>
</body>
</html>
