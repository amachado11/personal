<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard v7 - Gestão de Tempo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b1121;
            --card: rgba(30, 41, 59, 0.7);
            --primary: #38bdf8;
            --success: #4ade80;
            --text: #f8fafc;
            --accent: #818cf8;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 450px; }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 { margin: 10px 0; font-size: 1.8rem; text-align: center; }
        h2 { font-size: 0.9rem; margin: 0 0 15px 0; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }

        /* Resumo */
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .summary-item { background: var(--card); padding: 12px 5px; border-radius: 12px; text-align: center; }
        .summary-val { display: block; font-size: 1.4rem; font-weight: bold; color: var(--success); }
        .summary-label { font-size: 0.7rem; opacity: 0.7; }

        /* Contadores Táteis com Botões +/- */
        .counter-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .counter-label { display: flex; align-items: center; gap: 10px; font-weight: 500; }
        .counter-controls { display: flex; align-items: center; gap: 10px; }

        .btn-circle {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            font-weight: bold; font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        .counter-val { font-size: 1.2rem; font-weight: bold; min-width: 70px; text-align: center; color: var(--text); }

        /* Botão Salvar Principal */
        .btn-main {
            width: 100%; padding: 18px;
            background: var(--primary);
            color: #0b1121;
            border: none;
            border-radius: 15px;
            font-weight: 800; font-size: 1rem;
            margin-top: 15px; cursor: pointer;
            box-shadow: 0 4px 14px 0 rgba(56, 189, 248, 0.3);
        }

        /* Seção Oculta de Metas */
        #settings-panel { display: none; margin-top: 10px; }
        .settings-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .setting-input { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 8px; border-radius: 8px; width: 60px; text-align: center; font-size: 1rem; }
        .btn-settings { font-size: 1.3rem; background: none; border: none; cursor: pointer; padding: 5px; opacity: 0.7; color: var(--text); }

        canvas { max-width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align:center;">
        <h1>Life <span style="color:var(--primary)">Dashboard</span></h1>
        <p id="current-date" style="opacity: 0.6; font-size: 0.8rem;"></p>
        <button class="btn-settings" onclick="toggleSettings()">⚙️</button>
    </header>

    <div class="summary-grid">
        <div class="summary-item"><span class="summary-val" id="total-read">0h</span><span class="summary-label">Leitura Meta: <span id="meta-read-txt">--h</span></span></div>
        <div class="summary-item"><span class="summary-val" id="total-water">0L</span><span class="summary-label">Água Meta: <span id="meta-water-txt">--L</span></span></div>
        <div class="summary-item"><span class="summary-val" id="total-leisure">0h</span><span class="summary-label">Lazer Meta: <span id="meta-leisure-txt">--h</span></span></div>
    </div>

    <div class="card">
        <h2>Equilíbrio Diário (Últimos 7 dias)</h2>
        <canvas id="stackedTimeChart" style="height: 200px;"></canvas>
    </div>

    <div id="settings-panel" class="card">
        <h2>Defina Suas Metas Diárias</h2>
        <div class="settings-row"><span>😴 Sono Meta (h)</span><input type="number" step="0.5" id="meta-sleep" class="setting-input"></div>
        <div class="settings-row"><span>💼 Trabalho Meta (h)</span><input type="number" step="0.5" id="meta-work" class="setting-input"></div>
        <div class="settings-row"><span>📖 Leitura Meta (h)</span><input type="number" step="0.25" id="meta-read" class="setting-input"></div>
        <div class="settings-row"><span>💧 Água Meta (L)</span><input type="number" step="0.25" id="meta-water" class="setting-input"></div>
        <div class="settings-row"><span>🥳 Lazer Meta (h)</span><input type="number" step="0.5" id="meta-leisure" class="setting-input"></div>
        <button class="btn-main" style="background:var(--success)" onclick="saveSettings()">Salvar Metas</button>
    </div>

    <div class="card">
        <h2>Registro de Hoje</h2>
        
        <div class="counter-row">
            <span class="counter-label">😴 Sono</span>
            <div class="counter-controls">
                <button class="btn-circle" onclick="changeVal('sleep', -0.5)">-</button>
                <span class="counter-val" id="val-sleep">0h</span>
                <button class="btn-circle" onclick="changeVal('sleep', 0.5)">+</button>
            </div>
        </div>

        <div class="counter-row">
            <span class="counter-label">💼 Trabalho</span>
            <div class="counter-controls">
                <button class="btn-circle" onclick="changeVal('work', -0.5)">-</button>
                <span class="counter-val" id="val-work">0h</span>
                <button class="btn-circle" onclick="changeVal('work', 0.5)">+</button>
            </div>
        </div>

        <div class="counter-row">
            <span class="counter-label">🥳 Lazer</span>
            <div class="counter-controls">
                <button class="btn-circle" onclick="changeVal('leisure', -0.5)">-</button>
                <span class="counter-val" id="val-leisure">0h</span>
                <button class="btn-circle" onclick="changeVal('leisure', 0.5)">+</button>
            </div>
        </div>

        <div class="counter-row">
            <span class="counter-label">📖 Leitura</span>
            <div class="counter-controls">
                <button class="btn-circle" onclick="changeVal('read', -0.25)">-</button>
                <span class="counter-val" id="val-read">0h</span>
                <button class="btn-circle" onclick="changeVal('read', 0.25)">+</button>
            </div>
        </div>

        <div class="counter-row" style="border:none">
            <span class="counter-label">💧 Água</span>
            <div class="counter-controls">
                <button class="btn-circle" onclick="changeVal('water', -0.25)">-</button>
                <span class="counter-val" id="val-water">0L</span>
                <button class="btn-circle" onclick="changeVal('water', 0.25)">+</button>
            </div>
        </div>

        <button class="btn-main" onclick="saveToday()">SALVAR NO GITHUB PAGES</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('life_db_v7')) || {};
    // Metas Padrão (usuário pode editar)
    let goals = JSON.parse(localStorage.getItem('life_goals')) || { sleep: 8, work: 8, read: 0.5, water: 2.5, leisure: 2 };
    
    const today = new Date().toISOString().split('T')[0];
    let dayData = db[today] || { sleep: 0, work: 0, read: 0, water: 0, leisure: 0 };

    function init() {
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('pt-BR', {weekday: 'long', day: 'numeric', month: 'long'});
        loadSettingsInputs();
        updateUI();
        renderChart();
    }

    // Gerenciar Metas (Settings)
    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function loadSettingsInputs() {
        Object.keys(goals).forEach(key => {
            document.getElementById(`meta-${key}`).value = goals[key];
        });
    }

    function saveSettings() {
        Object.keys(goals).forEach(key => {
            goals[key] = parseFloat(document.getElementById(`meta-${key}`).value) || 0;
        });
        localStorage.setItem('life_goals', JSON.stringify(goals));
        alert("Metas atualizadas com sucesso!");
        toggleSettings();
        updateUI(); // Atualiza os textos de meta no resumo
    }

    // Lógica de Contadores
    function changeVal(type, amount) {
        dayData[type] = Math.max(0, dayData[type] + amount);
        updateUI();
    }

    function updateUI() {
        // Atualizar textos dos contadores do dia
        document.getElementById('val-sleep').innerText = dayData.sleep + 'h';
        document.getElementById('val-work').innerText = dayData.work + 'h';
        document.getElementById('val-read').innerText = dayData.read + 'h';
        document.getElementById('val-water').innerText = dayData.water.toFixed(2) + 'L';
        document.getElementById('val-leisure').innerText = dayData.leisure + 'h';

        // Atualizar resumos com metas atuais
        document.getElementById('meta-read-txt').innerText = goals.read + 'h';
        document.getElementById('meta-water-txt').innerText = goals.water + 'L';
        document.getElementById('meta-leisure-txt').innerText = goals.leisure + 'h';
    }

    function saveToday() {
        db[today] = dayData;
        localStorage.setItem('life_db_v7', JSON.stringify(db));
        alert("Dados salvos e prontos para o GitHub!");
        location.reload(); // Recarrega para atualizar gráficos
    }

    function renderChart() {
        const last7Days = Array.from({length: 7}, (_, i) => {
            const d = new Date();
            d.setDate(d.getDate() - i);
            return d.toISOString().split('T')[0];
        }).reverse();

        const workData = last7Days.map(d => db[d]?.work || 0);
        const sleepData = last7Days.map(d => db[d]?.sleep || 0);
        const readData = last7Days.map(d => db[d]?.read || 0);
        const waterData = last7Days.map(d => db[d]?.water || 0);
        const leisureData = last7Days.map(d => db[d]?.leisure || 0);

        // Atualizar Resumo Quantitativo no Topo
        document.getElementById('total-read').innerText = readData.reduce((a,b)=>a+b, 0) + 'h';
        document.getElementById('total-water').innerText = waterData.reduce((a,b)=>a+b, 0).toFixed(1) + 'L';
        document.getElementById('total-leisure').innerText = leisureData.reduce((a,b)=>a+b, 0) + 'h';

        // Gráfico de Barras Empilhadas
        const ctx = document.getElementById('stackedTimeChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: last7Days.map(d => d.split('-')[2]),
                datasets: [
                    { label: 'Trabalho', data: workData, backgroundColor: '#38bdf8' },
                    { label: 'Sono', data: sleepData, backgroundColor: '#818cf8' },
                    { label: 'Lazer', data: leisureData, backgroundColor: '#4ade80' },
                    { label: 'Leitura', data: readData, backgroundColor: '#fbbf24' }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    x: { stacked: true, grid: { display: false } },
                    y: { stacked: true, beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' } }
                },
                plugins: { legend: { position: 'bottom', labels: { color: '#f8fafc', boxWidth: 12, padding: 10 } } }
            }
        });
    }

    init();
</script>
</body>
</html>
