<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routine Tracker - Moto G34</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --success: #4ade80;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 400px; }

        header { text-align: center; margin: 20px 0; }
        header h1 { margin: 0; color: var(--primary); font-size: 1.5rem; }
        #data-atual { opacity: 0.7; font-size: 0.9rem; }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .habit-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #334155;
        }

        .habit-item:last-child { border-bottom: none; }

        /* Custom Checkbox */
        input[type="checkbox"] {
            width: 25px;
            height: 25px;
            accent-color: var(--success);
            cursor: pointer;
        }

        .btn-save {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #0f172a;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 10px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            text-align: center;
        }

        .stat-number { display: block; font-size: 1.2rem; font-weight: bold; color: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Minha Rotina</h1>
        <p id="data-atual"></p>
    </header>

    <div class="card">
        <canvas id="meuGrafico"></canvas>
        <div class="stats">
            <div><span class="stat-number" id="dias-check">0</span><span>Dias</span></div>
            <div><span class="stat-number" id="taxa-sucesso">0%</span><span>Meta</span></div>
        </div>
    </div>

    <div class="card">
        <div class="habit-item"><span>💪 Exercício</span><input type="checkbox" id="ex"></div>
        <div class="habit-item"><span>💻 Trabalho</span><input type="checkbox" id="tr"></div>
        <div class="habit-item"><span>🥗 Saúde</span><input type="checkbox" id="al"></div>
        <div class="habit-item"><span>📚 Estudo</span><input type="checkbox" id="es"></div>
        <button class="btn-save" onclick="salvarProgresso()">Salvar Hoje</button>
    </div>
</div>

<script>
    // 1. Configuração de Data
    const hoje = new Date().toISOString().split('T')[0];
    document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });

    // 2. Carregar Dados
    let historico = JSON.parse(localStorage.getItem('rotina_dados')) || {};

    function salvarProgresso() {
        const registro = {
            ex: document.getElementById('ex').checked,
            tr: document.getElementById('tr').checked,
            al: document.getElementById('al').checked,
            es: document.getElementById('es').checked
        };
        
        historico[hoje] = registro;
        localStorage.setItem('rotina_dados', JSON.stringify(historico));
        alert("Progresso salvo!");
        atualizarGrafico();
    }

    function atualizarGrafico() {
        const dias = Object.keys(historico).length;
        document.getElementById('dias-check').innerText = dias;

        // Lógica simples para o gráfico (soma de todos os hábitos feitos)
        let totais = [0, 0, 0, 0];
        Object.values(historico).forEach(d => {
            if(d.ex) totais[0]++;
            if(d.tr) totais[1]++;
            if(d.al) totais[2]++;
            if(d.es) totais[3]++;
        });

        chart.data.datasets[0].data = totais;
        chart.update();
    }

    // 3. Inicializar Gráfico
    const ctx = document.getElementById('meuGrafico').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Exerc.', 'Trab.', 'Aliment.', 'Estudo'],
            datasets: [{
                label: 'Dias Concluídos',
                data: [0, 0, 0, 0],
                backgroundColor: '#38bdf8'
            }]
        },
        options: {
            scales: { y: { beginAtZero: true, grid: { color: '#334155' } } },
            plugins: { legend: { display: false } }
        }
    });

    atualizarGrafico();
</script>

</body>
</html>
