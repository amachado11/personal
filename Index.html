<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routine Analytics Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --success: #4ade80;
            --text: #f8fafc;
            --accent: #818cf8;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 450px; }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        h2 { font-size: 1rem; margin: 0 0 15px 0; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }

        /* Contadores Quantitativos */
        .counter-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #334155;
        }

        .counter-controls { display: flex; align-items: center; gap: 15px; }

        .btn-circle {
            width: 35px; height: 35px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: bold;
            display: flex; align-items: center; justify-content: center;
        }

        .counter-val { font-size: 1.2rem; font-weight: bold; min-width: 60px; text-align: center; }

        /* Progress Bar Água */
        .water-bar-bg { width: 100%; height: 8px; background: #334155; border-radius: 4px; margin-top: 10px; overflow: hidden; }
        #water-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.5s; }

        .btn-save {
            width: 100%; padding: 18px;
            background: var(--primary);
            color: #0f172a; border: none;
            border-radius: 15px; font-weight: 800;
            margin-top: 10px; cursor: pointer;
        }

        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .summary-item { background: var(--card); padding: 15px; border-radius: 15px; text-align: center; }
        .summary-val { display: block; font-size: 1.5rem; font-weight: bold; color: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align:center; padding: 15px 0;">
        <h1 style="margin:0; font-size: 1.6rem;">Data <span style="color:var(--primary)">Routine</span></h1>
        <p id="display-date" style="opacity: 0.6; font-size: 0.8rem;"></p>
    </header>

    <div class="summary-grid">
        <div class="summary-item"><span class="summary-val" id="stat-water">0L</span><span>Água Total</span></div>
        <div class="summary-item"><span class="summary-val" id="stat-cardio">0m</span><span>Cardio Total</span></div>
    </div>

    <div class="card">
        <h2>Volume de Cardio (Minutos)</h2>
        <canvas id="lineChart" style="height: 180px;"></canvas>
    </div>

    <div class="card">
        <h2>Entradas de Hoje</h2>
        
        <div class="counter-row">
            <div>
                <span>💧 Hidratação</span>
                <div class="water-bar-bg"><div id="water-fill"></div></div>
            </div>
            <div class="counter-controls">
                <button class="btn-circle" onclick="changeVal('water', -0.25)">-</button>
                <span class="counter-val" id="val-water">0.0L</span>
                <button class="btn-circle" onclick="changeVal('water', 0.25)">+</button>
            </div>
        </div>

        <div class="counter-row">
            <span>🏃 Cardio (min)</span>
            <div class="counter-controls">
                <button class="btn-circle" onclick="changeVal('cardio', -5)">-</button>
                <span class="counter-val" id="val-cardio">0</span>
                <button class="btn-circle" onclick="changeVal('cardio', 5)">+</button>
            </div>
        </div>

        <div class="counter-row" style="border:none">
            <span>🥗 Refeições Limpas</span>
            <div class="counter-controls">
                <button class="btn-circle" onclick="changeVal('diet', -1)">-</button>
                <span class="counter-val" id="val-diet">0</span>
                <button class="btn-circle" onclick="changeVal('diet', 1)">+</button>
            </div>
        </div>

        <button class="btn-save" onclick="saveToday()">SALVAR REGISTRO</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('routine_v3_db')) || {};
    const today = new Date().toISOString().split('T')[0];
    
    // Estado temporário do dia
    let currentDay = db[today] || { water: 0, cardio: 0, diet: 0 };

    function init() {
        document.getElementById('display-date').innerText = new Date().toLocaleDateString('pt-BR', {dateStyle: 'full'});
        updateUI();
        renderChart();
    }

    function changeVal(type, amount) {
        currentDay[type] = Math.max(0, currentDay[type] + amount);
        updateUI();
    }

    function updateUI() {
        document.getElementById('val-water').innerText = currentDay.water.toFixed(2) + 'L';
        document.getElementById('val-cardio').innerText = currentDay.cardio;
        document.getElementById('val-diet').innerText = currentDay.diet;
        
        // Barra de água (meta 2L)
        const percent = Math.min(100, (currentDay.water / 2) * 100);
        document.getElementById('water-fill').style.width = percent + '%';
    }

    function saveToday() {
        db[today] = currentDay;
        localStorage.setItem('routine_v3_db', JSON.stringify(db));
        alert("Dados salvos no Moto G34!");
        location.reload(); // Recarrega para atualizar gráficos
    }

    function renderChart() {
        const last7Days = Array.from({length: 7}, (_, i) => {
            const d = new Date();
            d.setDate(d.getDate() - i);
            return d.toISOString().split('T')[0];
        }).reverse();

        const cardioData = last7Days.map(date => db[date]?.cardio || 0);
        const waterData = last7Days.map(date => db[date]?.water || 0);

        // Totais para o resumo
        document.getElementById('stat-water').innerText = waterData.reduce((a,b)=>a+b, 0).toFixed(1) + 'L';
        document.getElementById('stat-cardio').innerText = cardioData.reduce((a,b)=>a+b, 0) + 'm';

        new Chart(document.getElementById('lineChart'), {
            type: 'line',
            data: {
                labels: last7Days.map(d => d.split('-')[2]),
                datasets: [{
                    label: 'Minutos Cardio',
                    data: cardioData,
                    borderColor: '#38bdf8',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(56, 189, 248, 0.1)'
                }]
            },
            options: { 
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, grid: { color: '#334155' } } }
            }
        });
    }

    init();
</script>
</body>
</html>
